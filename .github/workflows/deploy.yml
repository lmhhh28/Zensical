name: Deploy Site to 1Panel

# 触发条件：当代码推送到 main 分支时触发
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取最新的仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登录服务器并清空旧的网页文件（保留 index 文件夹本身）
      - name: Clean remote directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            rm -rf /opt/1panel/www/sites/docs.lmhhh.wiki/index/*

      # 3. 将本地 site 文件夹内的最新内容直接传输到服务器的目标目录中
      - name: Copy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "site/*"
          target: "/opt/1panel/www/sites/docs.lmhhh.wiki/index"
          strip_components: 1
