name: zensical

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v4

    - name: setup ssh
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: add server
      run: |
        ssh-keyscan 161.118.223.143 >> ~/.ssh/known_hosts

    - name: backup old site
      run: |
        ssh root@161.118.223.143 "
        mkdir -p /opt/backup/docs &&
        cp -r /opt/1panel/www/sites/docs.lmhhh.wiki/index \
        /opt/backup/docs/site_$(date +%s)
        "

    - name: deploy site
      run: |
        rsync -avz --delete \
        site/ \
        root@161.118.223.143:/opt/1panel/www/sites/docs.lmhhh.wiki/index/
